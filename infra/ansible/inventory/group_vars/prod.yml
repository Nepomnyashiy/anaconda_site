ansible_python_interpreter: /usr/bin/python3

deploy_user: deploy
app_root: /opt/anaconda-site
app_domain: "{{ ansible_host }}"
public_url: "http://{{ app_domain }}/"
api_health_url: "http://{{ app_domain }}/api/v1/health"

repo_root: "{{ playbook_dir | dirname | dirname | dirname }}"
prod_env_file: "{{ repo_root }}/.env.prod"
bootstrap_public_key_path: "{{ repo_root }}/infra/keys/id_ed25519.pub"
deploy_private_key_path: "{{ repo_root }}/infra/keys/id_ed25519"
release_id: "{{ lookup('pipe', 'git -C ' ~ repo_root ~ ' rev-parse HEAD') | trim }}"
local_release_archive: "/tmp/anaconda-site-{{ release_id }}.tar.gz"

docker_install_script_url: https://get.docker.com
swapfile_size_mb: 2048

required_env_keys:
  - POSTGRES_DB
  - POSTGRES_USER
  - POSTGRES_PASSWORD
  - DATABASE_URL
  - NEXT_PUBLIC_SITE_URL
  - NEXT_PUBLIC_API_URL
  - APP_ENV
  - CORS_ALLOWED_ORIGINS

repo_archive_excludes:
  - .git
  - .github
  - docs
  - dev
  - references
  - node_modules
  - web/node_modules
  - web/.next
  - api/.pytest_cache
  - api/.ruff_cache
  - codex.md
  - .env
  - .env.prod
  - infra/keys/id_ed25519
  - infra/ansible/inventory/hosts.yml
  - infra/ansible/inventory/group_vars/prod/vault.yml
  - infra/ansible/.vault_pass.txt
