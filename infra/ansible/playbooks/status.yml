---
- name: Inspect production release status
  hosts: prod
  gather_facts: false

  tasks:
    - name: Resolve current release target
      ansible.builtin.command: readlink -f "{{ app_root }}/current"
      register: current_release
      changed_when: false
      failed_when: false

    - name: Show docker compose status
      ansible.builtin.command:
        argv:
          - docker
          - compose
          - -f
          - "{{ app_root }}/current/compose.prod.yml"
          - --env-file
          - "{{ app_root }}/shared/env/.env.prod"
          - ps
      register: compose_status
      changed_when: false
      failed_when: false

    - name: Verify public site responds
      ansible.builtin.uri:
        url: "{{ public_url }}"
        status_code: 200
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Verify API health responds
      ansible.builtin.uri:
        url: "{{ api_health_url }}"
        status_code: 200
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Report status summary
      ansible.builtin.debug:
        msg:
          - "current_release={{ current_release.stdout | default('<none>') }}"
          - "{{ compose_status.stdout_lines | default(['docker compose status unavailable']) }}"
