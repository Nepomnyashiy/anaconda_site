---
- name: Roll back production release
  hosts: prod
  gather_facts: false

  pre_tasks:
    - name: Assert release_id is provided
      ansible.builtin.assert:
        that:
          - release_id is defined
          - release_id | length > 0
        fail_msg: "Pass rollback target as -e release_id=<release-id>."

  tasks:
    - name: Check rollback target exists
      ansible.builtin.stat:
        path: "{{ app_root }}/releases/{{ release_id }}"
      register: rollback_target

    - name: Assert rollback target exists
      ansible.builtin.assert:
        that:
          - rollback_target.stat.exists
        fail_msg: "Release {{ release_id }} not found under {{ app_root }}/releases."

    - name: Run rollback through deploy script
      ansible.builtin.command:
        argv:
          - /bin/bash
          - "{{ app_root }}/releases/{{ release_id }}/infra/scripts/deploy_remote.sh"
      environment:
        APP_ROOT: "{{ app_root }}"
        RELEASE_ID: "{{ release_id }}"
      register: rollback_run
      changed_when: true

    - name: Verify public site responds after rollback
      ansible.builtin.uri:
        url: "{{ public_url }}"
        status_code: 200
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Verify API health responds after rollback
      ansible.builtin.uri:
        url: "{{ api_health_url }}"
        status_code: 200
      delegate_to: localhost
      become: false
      changed_when: false

    - name: Show rollback result
      ansible.builtin.debug:
        msg:
          - "rollback_release={{ release_id }}"
          - "{{ rollback_run.stdout | default('rollback completed') }}"
