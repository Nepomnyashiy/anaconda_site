name: Pipeline

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: production
  cancel-in-progress: false

jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: web/package.json
      - run: if [ -f package-lock.json ]; then npm ci; else npm install; fi
      - run: npm run lint
      - run: npm run typecheck
      - run: npm run build

  api:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: api
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install --no-cache-dir -r requirements.txt
      - run: ruff check app tests
      - run: pytest

  smoke:
    runs-on: ubuntu-latest
    needs:
      - web
      - api
    steps:
      - uses: actions/checkout@v4
      - name: Prepare env files
        run: |
          cp .env.example .env
          cp .env.prod.example .env.prod
      - name: Validate and boot production stack
        run: |
          docker compose -f compose.prod.yml config
          docker compose -f compose.prod.yml up -d --build
      - name: Wait for API health
        run: |
          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8000/api/v1/health >/tmp/api-health.json; then
              exit 0
            fi
            sleep 2
          done
          exit 1
      - name: Smoke test site and lead submission
        run: |
          curl -fsS http://127.0.0.1:3000 >/tmp/site.html
          curl -fsS -X POST http://127.0.0.1:8000/api/v1/leads \
            -H 'Content-Type: application/json' \
            -d '{"name":"CI Check","company":"OSNOVA","contact":"ci@example.com","message":"Smoke test for production pipeline.","consent":true,"source_page":"github-actions"}' \
            >/tmp/lead.json
      - name: Shutdown production stack
        if: always()
        run: docker compose -f compose.prod.yml down -v

  deploy:
    runs-on: ubuntu-latest
    environment: production
    needs:
      - web
      - api
      - smoke
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' && secrets.PROD_HOST != '' && secrets.PROD_USER != '' && secrets.PROD_SSH_PRIVATE_KEY != '' && secrets.PROD_ENV_FILE != ''
    steps:
      - uses: actions/checkout@v4

      - name: Start ssh-agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.PROD_SSH_PRIVATE_KEY }}

      - name: Trust production host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.PROD_HOST }}" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          PROD_HOST: ${{ secrets.PROD_HOST }}
          PROD_USER: ${{ secrets.PROD_USER }}
          PROD_ENV_FILE: ${{ secrets.PROD_ENV_FILE }}
          RELEASE_ID: ${{ github.sha }}
        run: |
          ssh "${PROD_USER}@${PROD_HOST}" "mkdir -p /opt/anaconda-site/releases/${RELEASE_ID} /opt/anaconda-site/shared/env"
          printf '%s' "${PROD_ENV_FILE}" | ssh "${PROD_USER}@${PROD_HOST}" "cat > /opt/anaconda-site/shared/env/.env.prod"
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=docs \
            --exclude=dev \
            --exclude=references \
            --exclude=node_modules \
            --exclude=web/node_modules \
            --exclude=web/.next \
            --exclude=api/.pytest_cache \
            --exclude=api/.ruff_cache \
            --exclude=codex.md \
            --exclude=.env \
            --exclude=.env.prod \
            --exclude=infra/keys/id_ed25519 \
            -czf - . | ssh "${PROD_USER}@${PROD_HOST}" "tar -xzf - -C /opt/anaconda-site/releases/${RELEASE_ID}"
          ssh "${PROD_USER}@${PROD_HOST}" "APP_ROOT=/opt/anaconda-site RELEASE_ID=${RELEASE_ID} /bin/bash /opt/anaconda-site/releases/${RELEASE_ID}/infra/scripts/deploy_remote.sh"
